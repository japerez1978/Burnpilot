# Supabase CLI config — ver https://supabase.com/docs/guides/cli/config
# BurnPilot usa Supabase Cloud (eu-west-1) en dev y prod.
# Este archivo queda como referencia para `supabase link` y `supabase db push`.

project_id = "burnpilot"

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
